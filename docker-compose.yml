version: "3.9"

services:
  comfyui-agent:
    build: .
    image: comfyui-agent:latest
    container_name: comfyui-agent

    # Expose ComfyUI web UI
    ports:
      - "8188:8188"

    environment:
      # Required: your Anthropic API key
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Optional: improve model download quality
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - CIVITAI_API_KEY=${CIVITAI_API_KEY:-}
      # Run a one-shot task on container start (leave empty for no auto-task)
      - AGENT_TASK=${AGENT_TASK:-}
      # Set to "1" to start an interactive REPL on container start
      - AGENT_REPL=${AGENT_REPL:-0}
      # Agent model override
      - AGENT_MODEL=${AGENT_MODEL:-claude-sonnet-4-6}

    volumes:
      # Persist models between restarts
      - comfyui_models:/root/ComfyUI/models
      # Persist custom nodes
      - comfyui_custom_nodes:/root/ComfyUI/custom_nodes
      # Persist ComfyUI outputs
      - comfyui_output:/root/ComfyUI/output
      # Persist agent state and saved workflows
      - ./state:/opt/comfyui-agent/state
      - ./workflows:/opt/comfyui-agent/workflows

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  comfyui_models:
  comfyui_custom_nodes:
  comfyui_output:
