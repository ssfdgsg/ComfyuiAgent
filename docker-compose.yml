version: "3.9"

services:
  comfyui-agent:
    build: .
    image: comfyui-agent:latest
    container_name: comfyui-agent
    ports:
      - "8188:8188"   # ComfyUI Web UI
      - "8080:8080"   # Agent Web UI

    environment:
      # ── LLM API Keys ──
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-exp}
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-gemini}

      # ── Model hub tokens ──
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - CIVITAI_API_KEY=${CIVITAI_API_KEY:-}
      - MODELSCOPE_TOKEN=${MODELSCOPE_TOKEN:-}   # 魔搭 token

      # ── ComfyUI ──
      - COMFYUI_URL=http://localhost:8188
      - COMFYUI_PATH=/root/ComfyUI

      # ── Web server ──
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8080

    volumes:
      - comfyui_models:/root/ComfyUI/models
      - comfyui_custom_nodes:/root/ComfyUI/custom_nodes
      - comfyui_output:/root/ComfyUI/output
      - ./state:/opt/comfyui-agent/state
      - ./workflows:/opt/comfyui-agent/workflows

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  comfyui_models:
  comfyui_custom_nodes:
  comfyui_output:
